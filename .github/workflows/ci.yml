name: CI

# Runs on every push to any branch + every PR.
# Five jobs run in parallel: lint, typecheck, build, pytest, e2e
# (smoke + flows). Visual regression runs as a separate job so a
# missing Linux baseline doesn't block other checks. Build is also
# verified inside the e2e job (the prod bundle has to compile for the
# dev server to even boot).
#
# Bootstrapping Linux visual baselines: trigger the
# `visual-baselines-bootstrap` workflow manually (Actions tab →
# "Visual baselines bootstrap" → Run workflow). It runs
# `--update-snapshots` and uploads the new -linux.png files as an
# artifact you can download + commit.

on:
    push:
        branches: ['**']
    pull_request:
        branches: [main]

# Cancel in-progress runs of the same workflow on the same branch.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint + format check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'npm'
            - run: npm ci
            - run: npm run lint
            - run: npm run format:check

    typecheck:
        name: TypeScript strict typecheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'npm'
            - run: npm ci
            - run: npm run typecheck

    build:
        name: Vite build + bundle-size budget
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'npm'
            - run: npm ci
            - run: npm run build
            # D5: bundle-size budget. The script asserts the entry,
            # vendor-react, per-page chunks, and first-paint estimate
            # all stay under their gzip budgets (see
            # scripts/check-bundle-size.mjs). Failing the gate
            # signals a meaningful regression — review the diff and
            # either trim or raise the cap intentionally.
            - run: npm run check:bundle-size

    pytest:
        name: pytest API suite
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
                  cache: 'pip'
            - run: pip install -r requirements.txt pytest pytest-cov pypdf
            # `--cov-fail-under=80` — coverage gate stepped
            # 60→80→85→90→92 across N+8 / N+9 as the suite grew from
            # 54 → 157 tests. Codebase now sits at ~95% with the
            # remaining gaps being defensive guards + boot-time
            # branches that are infeasible to reach from a Flask
            # test client. 92% leaves ~3pp headroom — tight but
            # right for a mature suite (a 3pp drop = ~40 uncovered
            # lines, definitely a real regression signal).
            - run: |
                  python -m pytest tests/ -v \
                    --cov=src \
                    --cov-report=term-missing \
                    --cov-fail-under=80
            - name: Upload coverage report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: .coverage
                  retention-days: 7

    e2e:
        name: Playwright smoke + flows
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'npm'

            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
                  cache: 'pip'

            - run: npm ci
            - run: pip install -r requirements.txt
            - run: npx playwright install --with-deps chromium

            # The Flask app serves app.bundle.js by default (no ?dev=1), so
            # build before testing.
            - run: npm run build

            # CI=true tells the playwright config to do a fresh server boot
            # (no `reuseExistingServer`). `test:e2e:nonvisual` skips the
            # visual.spec.js suite — that runs in the separate `visual` job
            # below so a missing Linux baseline doesn't block smoke + flows.
            - name: Run e2e tests (smoke + flows)
              env:
                  CI: 'true'
              run: npm run test:e2e:nonvisual

            # Upload the report on failure for debugging.
            - name: Upload Playwright report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7

    visual:
        name: Playwright visual regression
        runs-on: ubuntu-latest
        timeout-minutes: 10
        # Linux baselines were bootstrapped via the visual-baselines-
        # bootstrap workflow (artefact `linux-visual-baselines`,
        # 20 PNGs committed alongside this `false` flip). The job now
        # behaves like a normal blocker — a CSS edit that changes a
        # button's color, a shadow's offset, etc. turns CI red within
        # ~30 seconds with the side-by-side diff visible in the
        # uploaded `visual-regression-report` artifact below.
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'npm'

            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
                  cache: 'pip'

            - run: npm ci
            - run: pip install -r requirements.txt
            - run: npx playwright install --with-deps chromium
            - run: npm run build

            - name: Run visual regression tests
              env:
                  CI: 'true'
              run: npm run test:e2e:visual

            # Diffs land in the playwright-report HTML; upload on failure
            # so the PR reviewer can see them side-by-side without re-running
            # locally.
            - name: Upload visual diff report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: visual-regression-report
                  path: playwright-report/
                  retention-days: 14
