<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- The GG mark: concentric blue / amber / green rings with a soft glow,
       on a TRANSPARENT background (adapts to light/dark browser tabs). The
       glow is a layered blurred copy + a radial halo; the crisp rings sit on
       top. No white fill anywhere — the centre is transparent. -->
  <defs>
    <radialGradient id="gg-halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3aa0ff" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#3aa0ff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#3aa0ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="gg-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#gg-halo)"/>
  <g fill="none" filter="url(#gg-glow)" opacity="0.6">
    <circle cx="32" cy="32" r="22" stroke="#0071e3" stroke-width="6"/>
    <circle cx="32" cy="32" r="15" stroke="#ff9500" stroke-width="4"/>
    <circle cx="32" cy="32" r="10" stroke="#34c759" stroke-width="4"/>
  </g>
  <g fill="none">
    <circle cx="32" cy="32" r="22" stroke="#0071e3" stroke-width="6"/>
    <circle cx="32" cy="32" r="15" stroke="#ff9500" stroke-width="4"/>
    <circle cx="32" cy="32" r="10" stroke="#34c759" stroke-width="4"/>
  </g>
  <!-- White inner core (the centre dot is part of the mark; only the outer
       canvas is transparent). -->
  <circle cx="32" cy="32" r="8" fill="#ffffff"/>
</svg>
