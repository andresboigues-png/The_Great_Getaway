<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- White rounded-square background. rx=14 (~22% of side) matches iOS-style
       app icon corners. iOS PWA install will round further; Android keeps it. -->
  <rect width="64" height="64" rx="14" ry="14" fill="#ffffff" />
  <!-- Three concentric rings — outer blue (brand), middle yellow, inner green.
       Outer kept thick for prominence; the two inner rings stay thin so the
       white centre still reads as the dominant fill rather than the rings
       crowding into a bullseye. -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#0071e3" stroke-width="6" />
  <circle cx="32" cy="32" r="15" fill="none" stroke="#ffd60a" stroke-width="2" />
  <circle cx="32" cy="32" r="10" fill="none" stroke="#34c759" stroke-width="2" />
</svg>
