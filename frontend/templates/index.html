<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The Great Getaway</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">

    <!-- PWA: installable on iOS/Android, standalone display, themed nav.
         Real PNG icons + splash screens come in Phase L. -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0071e3">
    <!-- iOS Safari needs its own meta tags; manifest.json alone is ignored. -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="The GG">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.svg') }}">

    <!-- Sentry — error tracking. Loader is async and lazy-loads the full
         SDK on first error. Placed early so it can capture errors from
         the other CDN scripts that follow. The hash in the URL is the
         Sentry public key (intentionally public, not a secret). -->
    <script
        src="https://js-de.sentry-cdn.com/4807f5072827f760461e06af2dbb446c.min.js"
        crossorigin="anonymous"></script>
    <script>
        // Tag every event with environment so dev/prod are separable in
        // the Sentry dashboard. The loader auto-initializes with its
        // dashboard defaults; sentryOnLoad lets us re-init with overrides.
        window.sentryOnLoad = function () {
            var hostname = location.hostname;
            var isLocal = hostname === 'localhost' || hostname === '127.0.0.1';
            // eslint-disable-next-line no-undef
            Sentry.init({
                environment: isLocal ? 'development' : 'production',
                // Drop known third-party noise we can't control.
                ignoreErrors: [/google.*api/i, /gapi/i, /Cannot read properties of undefined \(reading 'google'\)/],
                // Performance traces off for now — opt in later if useful.
                tracesSampleRate: 0,
            });
        };
    </script>

    <!-- Removed Leaflet -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=places&loading=async"></script>
    <script>
        window.globalGoogleClientId = "{{ google_client_id }}";
        window.googleMapsApiKey = "{{ google_maps_api_key }}";
    </script>
</head>

<body>

    <!-- Left Sidebar Overlay -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- Left Sidebar Panel -->
    <div id="sidebar" class="sidebar glass">
        <div class="sidebar-header">
            <span class="sidebar-title">Menu</span>
            <button id="sidebarClose" class="sidebar-close-btn">&times;</button>
        </div>

        <!-- Home pinned at top -->
        <a href="#" class="sidebar-item" data-page="home" style="margin-bottom: 8px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            </svg>
            Home
        </a>

        <div style="height: 1px; background: var(--glass-border); margin-bottom: 16px;"></div>

        <!-- Equal spacer above middle nav -->
        <div style="flex: 1;"></div>

        <!-- Middle navigation sections -->
        <div style="display: flex; flex-direction: column;">

        <div class="sidebar-section-label">Account</div>
        <a href="#" class="sidebar-item" data-page="collections">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
            </svg>
            Collections
        </a>
        <a href="#" class="sidebar-item" data-page="friends">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            Friends
        </a>

        <div class="sidebar-section-label" style="margin-top: 16px;">Keeping track</div>
        <a href="#" class="sidebar-item" data-page="budgets">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="7" width="20" height="14" rx="2" />
                <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
            </svg>
            Budgets
        </a>
        <a href="#" class="sidebar-item" data-page="settlement">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
            </svg>
            Settlements
        </a>

        <div class="sidebar-section-label" style="margin-top: 16px;">Preferences</div>
        <a href="#" class="sidebar-item" data-page="personalization">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z">
                </path>
            </svg>
            Personalization
        </a>
        <a href="#" class="sidebar-item" data-page="settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings">
                <path
                    d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                <circle cx="12" cy="12" r="3" />
            </svg>
            Settings
        </a>

        </div> <!-- end middle nav -->

        <!-- Spacer to push profile to bottom -->
        <div style="flex: 1;"></div>

        <!-- Pinned Profile / Login Footer -->
        <div style="border-top: 1px solid var(--glass-border); padding-top: 16px; margin-top: 16px; display: flex; align-items: center;">
            <a href="#" class="sidebar-item" data-page="profile" id="sidebarProfileLink" style="gap: 12px; flex: 1; margin-bottom: 0;">
                <div id="sidebarProfileAvatar" style="display: none; width: 36px; height: 36px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid var(--accent-blue);">
                    <img id="sidebarProfilePic" src="" alt="" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div id="sidebarProfileIcon" style="flex-shrink: 0;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </div>
                <div style="overflow: hidden;">
                    <div id="sidebarProfileLabel" style="font-weight: 600; font-size: 0.95rem;">Log in</div>
                    <div id="sidebarProfileSub" style="font-size: 0.75rem; color: var(--text-secondary); display: none;">Logged in</div>
                </div>
            </a>
            <button id="sidebarLogoutBtn" style="display: none;" title="Log Out">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </div>
    </div>

    <!-- Top Navigation Bar -->
    <nav class="navbar glass">
        <div style="display: flex; align-items: center; gap: 16px;">
            <button id="hamburgerBtn" class="hamburger-btn" aria-label="Open menu">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-brand">The Great Getaway</div>
            <!-- Notification Bell -->
            <div style="position: relative; margin-left: 8px;">
                <button id="notificationBellBtn" style="background: transparent; border: none; cursor: pointer; position: relative; padding: 4px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s;">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <!-- Unread Badge -->
                    <span id="notificationBadge" style="position: absolute; top: -4px; right: -4px; min-width: 18px; height: 18px; background: #ff3b30; border-radius: 10px; border: 2px solid #ffffff; display: none; color: white; font-size: 10px; font-weight: 800; align-items: center; justify-content: center; padding: 0 4px; box-sizing: border-box; line-height: 1;"></span>
                </button>
                
                <!-- Dropdown — liquid-glass aesthetic matching `.btn-ghost`:
                     translucent white fill + backdrop blur, white text. -->
                <div id="notificationDropdown" style="position: absolute; top: 100%; left: 0; width: 340px; max-height: 420px; overflow-y: auto; border-radius: 18px; background: var(--glass-fill); backdrop-filter: saturate(180%) blur(24px); -webkit-backdrop-filter: saturate(180%) blur(24px); border: 1px solid rgba(255,255,255,0.25); box-shadow: 0 20px 50px rgba(0,0,0,0.25); margin-top: 12px; display: none; z-index: 1000; flex-direction: column; box-sizing: border-box; color: #ffffff;">
                    <div style="padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.18); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 2; box-sizing: border-box;">
                        <h3 style="margin: 0; font-size: 1rem; color: #ffffff; font-weight: 700;">Notifications</h3>
                        <button id="markAllReadBtn" style="background: transparent; border: none; color: rgba(255,255,255,0.85); font-size: 0.8rem; font-weight: 600; cursor: pointer;">Mark all read</button>
                    </div>
                    <div id="notificationList" style="display: flex; flex-direction: column;">
                        <div class="notification-empty">No new notifications</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="nav-links">
            <a href="#" class="nav-item active" data-page="home">Home</a>
            <a href="#" class="nav-item" data-page="ai">Plan with AI ✦</a>
            <a href="#" class="nav-item" data-page="expenses">Expenses</a>
            <a href="#" class="nav-item" data-page="insights">Insights</a>
        </div>
        <div class="nav-trips" style="display: flex; align-items: center; gap: 8px;">
            <button class="btn-primary-pill" id="newTripBtn">+ New Trip</button>
            <select id="tripSelector" class="glass-input" style="min-width: 160px; padding: 5px 10px; font-size: 0.85rem;">
                <option value="">Select a Trip...</option>
            </select>
            <button class="icon-btn-circle" id="completeTripBtn" style="--accent: 52,199,89; display: none;" title="Complete Trip">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>
            <button class="icon-btn-circle" id="deleteTripBtn" style="--accent: 255,59,48; display: none;" title="Delete Trip">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            </button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-container">
        <!-- Pages will be dynamically injected here via JS -->
    </main>

    {% if dev_mode %}
    <script type="module" src="{{ url_for('static', filename='js/src/main.js') }}"></script>
    {% else %}
    <script src="{{ url_for('static', filename='js/app.bundle.js') }}" defer></script>
    {% endif %}
</body>

</html>
