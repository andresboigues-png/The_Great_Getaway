<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Escape</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>

    <!-- Left Sidebar Overlay -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- Left Sidebar Panel -->
    <div id="sidebar" class="sidebar glass">
        <div class="sidebar-header">
            <span class="sidebar-title">Menu</span>
            <button id="sidebarClose" class="sidebar-close-btn">&times;</button>
        </div>
        
        <!-- User Account Section -->
        <div id="userAccountSection" style="padding: 0 12px 20px; border-bottom: 1px solid var(--glass-border); margin-bottom: 20px;">
            <div id="userProfile" style="display: none; align-items: center; gap: 12px; margin-bottom: 12px;">
                <img id="userPicture" src="" alt="Profile" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent-blue);">
                <div style="overflow: hidden;">
                    <div id="userName" style="font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
                    <div id="userEmail" style="font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
                </div>
            </div>
            <div id="googleLoginBtn"></div>
            <button id="logoutBtn" class="btn-liquid-glass" style="width: 100%; display: none; margin-top: 8px; font-size: 0.8rem; padding: 8px;">Logout</button>
        </div>

        <div class="sidebar-section-label">Main</div>
        <a href="#" class="sidebar-item" data-page="home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            Home
        </a>
        <a href="#" class="sidebar-item" data-page="friends">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Friends
        </a>

        <div class="sidebar-section-label" style="margin-top: 16px;">Explore</div>
        <a href="#" class="sidebar-item" data-page="budgets">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
            Budgets
        </a>
        <a href="#" class="sidebar-item" data-page="collections">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            Collections
        </a>

        <a href="#" class="sidebar-item" data-page="settlement">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Settlements
        </a>

        <div class="sidebar-section-label" style="margin-top: 16px;">Preferences</div>
        <a href="#" class="sidebar-item" data-page="personalization">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
            Personalization
        </a>
        <a href="#" class="sidebar-item" data-page="settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1-2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
            Settings
        </a>
    </div>

    <!-- Top Navigation Bar -->
    <nav class="navbar glass">
        <div style="display: flex; align-items: center; gap: 16px;">
            <button id="hamburgerBtn" class="hamburger-btn" aria-label="Open menu">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-brand">The Great Escape</div>
        </div>
        <div class="nav-links">
            <a href="#" class="nav-item active" data-page="home">Home</a>
            <a href="#" class="nav-item" data-page="expenses">Expenses</a>
            <a href="#" class="nav-item" data-page="upload">Upload</a>
            <a href="#" class="nav-item" data-page="insights">Insights</a>
            <a href="#" class="nav-item" data-page="ai">Plan with AI ✦</a>
        </div>
        <div class="nav-trips">
            <select id="tripSelector" class="glass-input">
                <option value="">Select a Trip...</option>
            </select>
            <button class="btn btn-small" id="newTripBtn">+ New Trip</button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-container">
        <!-- Pages will be dynamically injected here via JS -->
    </main>

    <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
